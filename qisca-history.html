<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root{
    --navy:#20204E;
    --navy-2:#2C2C63;
    --ink:#33334A;
    --ink-soft:#6A6A82;
    --gold:#C4A24C;
    --gold-deep:#A9863A;
    --line:#E6E6F0;
    --card:#FFFFFF;
    /* softened chapter tints */
    --t-2024:#FFFFFF;
    --t-2025:#EDF2F8;
    --t-2026:#F5F2FC;
    --head:'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    --body:'Lora', Georgia, serif;
    --maxw:1040px;
  }
  html{ scroll-behavior:smooth; }
  body{ background:#fff; color:var(--ink); font-family:var(--body); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; line-height:1.62; overflow-x:hidden; }
  body.lang-ko{ --head:'Pretendard', sans-serif; --body:'Pretendard', sans-serif; letter-spacing:-.01em; }

  .wrap{ max-width:var(--maxw); margin:0 auto; padding:0 26px; }

  /* ---------- top bar ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding:22px 0 0; }
  .brand{ font-family:var(--head); font-weight:600; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); }
  .brand b{ color:var(--navy); font-weight:700; }
  .lang{ display:inline-flex; border:1px solid var(--line); border-radius:999px; background:#fff; padding:3px; box-shadow:0 8px 20px -14px rgba(32,32,78,.4); }
  .lang button{ font-family:var(--head); font-size:12px; letter-spacing:.06em; font-weight:600; border:0; background:transparent; color:var(--ink-soft); padding:6px 15px; border-radius:999px; cursor:pointer; transition:all .2s ease; }
  .lang button.active{ background:var(--navy); color:#fff; }
  .lang button:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  /* ---------- hero ---------- */
  .hero{ padding:56px 0 44px; }
  .eyebrow{ font-family:var(--head); font-weight:600; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold-deep); display:flex; align-items:center; gap:11px; }
  .eyebrow .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); }
  .hero h1{ font-family:var(--head); font-weight:700; color:var(--navy); font-size:clamp(34px,6vw,58px); line-height:1.03; letter-spacing:-.02em; margin:16px 0 0; }
  .hero .thesis{ max-width:640px; margin:20px 0 0; font-size:clamp(15px,2vw,18px); color:var(--ink); }
  .stats{ display:flex; flex-wrap:wrap; gap:10px; margin-top:30px; }
  .stat{ display:flex; flex-direction:column; gap:2px; border:1px solid var(--line); background:#fff; border-radius:12px; padding:12px 18px; box-shadow:0 10px 26px -20px rgba(32,32,78,.4); }
  .stat .n{ font-family:var(--head); font-weight:700; font-size:22px; color:var(--navy); }
  .stat .l{ font-family:var(--head); font-weight:500; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); }

  /* ---------- chapter band ---------- */
  .band{ padding:44px 0 40px; border-top:1px solid rgba(32,32,78,.06); }
  .band.b2024{ background:var(--t-2024); }
  .band.b2025{ background:var(--t-2025); }
  .band.b2026{ background:var(--t-2026); }
  .cwrap{ max-width:var(--maxw); margin:0 auto; padding:0 26px; display:grid; grid-template-columns:210px 1fr; gap:26px; }

  .chead b{ display:block; font-family:var(--head); font-weight:700; font-size:52px; line-height:.95; color:var(--navy); letter-spacing:-.01em; }
  .chead .u{ width:32px; height:3px; background:var(--gold); margin:14px 0 12px; }
  .chead .sub{ font-family:var(--head); font-weight:600; font-size:14px; color:var(--navy-2); }
  .chead .chips{ display:flex; flex-direction:column; gap:7px; margin-top:16px; }
  .chead .chip{ font-family:var(--head); font-weight:500; font-size:11.5px; letter-spacing:.02em; color:var(--ink-soft); display:flex; align-items:center; gap:8px; }
  .chead .chip::before{ content:""; width:5px; height:5px; border-radius:50%; background:var(--gold); flex:none; }

  /* ---------- events ---------- */
  .list{ position:relative; padding-left:28px; }
  .list::before{ content:""; position:absolute; left:6px; top:10px; bottom:10px; width:2px; background:rgba(32,32,78,.14); }
  .ev{ position:relative; padding-bottom:26px; opacity:0; transform:translateY(16px); transition:opacity .55s ease, transform .55s cubic-bezier(.2,.7,.2,1); }
  .ev.show{ opacity:1; transform:none; }
  .ev:last-child{ padding-bottom:4px; }
  .ev::before{ content:""; position:absolute; left:-25px; top:5px; width:13px; height:13px; border-radius:50%; background:#fff; border:2px solid var(--navy); }
  .band.b2024 .ev::before{ box-shadow:0 0 0 4px var(--t-2024); }
  .band.b2025 .ev::before{ box-shadow:0 0 0 4px var(--t-2025); }
  .band.b2026 .ev::before{ box-shadow:0 0 0 4px var(--t-2026); }
  .ev.gold::before{ border-color:var(--gold); background:var(--gold); }

  .meta{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:5px; }
  .date{ font-family:var(--head); font-weight:500; font-size:12px; letter-spacing:.03em; color:var(--ink-soft); }
  .tag{ font-family:var(--head); font-weight:600; font-size:10px; letter-spacing:.11em; text-transform:uppercase; color:var(--gold-deep); border:1px solid rgba(196,162,76,.42); border-radius:6px; padding:2px 8px; }
  .ev h3{ font-family:var(--head); font-weight:600; font-size:17px; line-height:1.36; color:var(--navy); letter-spacing:-.005em; }
  .ev .detail{ margin-top:6px; font-size:14.5px; color:var(--ink); max-width:660px; }

  .photo{ margin-top:13px; max-width:480px; aspect-ratio:16/9; border-radius:10px; overflow:hidden; border:1px solid rgba(32,32,78,.12); background:linear-gradient(135deg, rgba(196,162,76,.10), rgba(32,32,78,.04)); display:flex; align-items:center; justify-content:center; }
  .photo img{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo .ph{ font-family:var(--head); font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-soft); display:flex; flex-direction:column; align-items:center; gap:6px; }
  .photo .ph svg{ width:20px; height:20px; opacity:.7; }

  /* milestone row */
  .ev.mile{ padding-bottom:24px; }
  .ev.mile .m{ display:inline-flex; align-items:baseline; gap:10px; padding:8px 16px; border:1px solid rgba(196,162,76,.4); border-radius:12px; background:rgba(196,162,76,.06); }
  .ev.mile .n{ font-family:var(--head); font-weight:700; font-size:26px; line-height:1; color:var(--gold-deep); }
  .ev.mile .l{ font-family:var(--head); font-weight:600; font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--navy); }
  .ev.mile .d{ font-family:var(--head); font-weight:500; font-size:11px; color:var(--ink-soft); margin-left:2px; }

  /* ---------- footer ---------- */
  .foot{ background:var(--navy); padding:30px 26px; text-align:center; }
  .foot .k{ font-family:var(--head); font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.72); }
  .foot a{ color:#fff; text-decoration:none; border-bottom:1px solid rgba(255,255,255,.4); padding-bottom:1px; }
  .foot a:hover{ border-color:#fff; }

  @media (max-width:760px){
    .wrap, .cwrap{ padding-left:20px; padding-right:20px; }
    .cwrap{ grid-template-columns:1fr; gap:14px; }
    .chead b{ font-size:38px; }
    .chead .chips{ flex-direction:row; flex-wrap:wrap; gap:6px 16px; margin-top:12px; }
    .band{ padding:34px 0 30px; }
    .photo{ max-width:100%; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ scroll-behavior:auto !important; }
    .ev{ opacity:1; transform:none; transition:none; }
  }
</style>

            ? `<div class="photo"><img src="${d.photo}" alt="" loading="lazy"></div>`
            : `<div class="photo"><div class="ph">${camIcon}<span>Photo</span></div></div>`;
        }
        rows += `<div class="ev ${d.gold?'gold':''} reveal">
          <div class="meta"><span class="date">${d.date}</span>${tag}</div>
          <h3>${d.title[LANG]}</h3>${detail}${photo}
        </div>`;
      }
    });

    const chips = (y.chips||[]).map(c=>`<span class="chip">${c}</span>`).join("");
    band.innerHTML = `<div class="cwrap">
      <div class="chead">
        <b>${year}</b><div class="u"></div>
        <div class="sub">${y.sub||""}</div>
        <div class="chips">${chips}</div>
      </div>
      <div class="list">${rows}</div>
    </div>`;
    chapters.appendChild(band);
  });

  observe();
  reportHeight();
}

function setLang(l){
  LANG = l;
  document.body.classList.toggle("lang-ko", l==="ko");
  document.body.classList.toggle("lang-en", l==="en");
  document.documentElement.lang = l;
  document.getElementById("btn-en").classList.toggle("active", l==="en");
  document.getElementById("btn-ko").classList.toggle("active", l==="ko");
  applyUI();
  build();
}

function applyUI(){
  const u = UI[LANG];
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if(u[k] !== undefined) el.textContent = u[k];
  });
  document.getElementById("stats").innerHTML =
    u.stats.map(s=>`<div class="stat"><span class="n">${s[0]}</span><span class="l">${s[1]}</span></div>`).join("");
}

let io;
function observe(){
  if(io) io.disconnect();
  io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("show"); io.unobserve(e.target); reportHeight(); } });
  }, { threshold:0.14, rootMargin:"0px 0px -6% 0px" });
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
}

/* Wix auto-resize */
let lastH = 0;
function reportHeight(){
  const h = Math.ceil(document.documentElement.scrollHeight);
  if(Math.abs(h-lastH) > 2){ lastH = h; try{ window.parent.postMessage({ qiscaHeight:h }, "*"); }catch(e){} }
}
if(window.ResizeObserver){ new ResizeObserver(()=>reportHeight()).observe(document.body); }
window.addEventListener("load", reportHeight);
window.addEventListener("resize", reportHeight);

applyUI();
build();
</script>
</body>
</html>
